services:
  # Backend API Service (NestJS)
  - type: web
    name: comprahorro-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /health
    autoDeploy: true

  # Frontend Service (React/Vite)
  - type: web
    name: comprahorro-frontend
    runtime: static
    plan: free
    buildCommand: cd comprahorro-panama && npm install && npm run build
    staticPublishPath: comprahorro-panama/dist
    envVars:
      - key: VITE_API_URL
        value: https://comprahorro-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

# Database Service (PostgreSQL)
databases:
  - name: comprahorro-db
    plan: free
    databaseName: comprahorro
    user: comprahorro_user
