<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComprAhorro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    <div class="max-w-4xl mx-auto p-6">
        <div class="flex flex-col items-center mb-8">
            <img src="logo.png" alt="ComprAhorro Logo" class="w-48 h-auto mb-4">
            <h1 class="text-4xl font-bold text-slate-900">ComprAhorro</h1>
        </div>

        <div class="text-center mb-10 px-4">
            <p class="text-lg text-slate-600 leading-relaxed">
                ComprAhorro busca por ti lo que necesitas y te muestra al instante <span class="text-blue-600 font-bold">varias opciones con sus precios</span>, todo en un solo lugar y <span class="text-blue-600 font-bold">en tiempo real</span>. Así podrás <span class="text-orange-500 font-bold">comprar directamente al comercio, maximizando tus ahorros</span> con total comodidad.
            </p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl mb-8">
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="¿Qué quieres BUSCAR hoy?" 
                       class="flex-1 p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none">
                <button onclick="buscarProductos()" 
                        class="bg-black text-white px-8 py-4 rounded-xl font-bold hover:bg-slate-800 transition">
                    BUSCAR
                </button>
            </div>
        </div>

        <div id="resultados" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </div>

    <script>
        async function buscarProductos() {
            const q = document.getElementById('searchInput').value;
            const resDiv = document.getElementById('resultados');
            resDiv.innerHTML = '<p class="text-center col-span-2">Buscando ahorros para ti...</p>';

            try {
                // Usamos la ruta corregida que Claude y Capi ajustaron
                const response = await fetch(`/ahorros/buscar?q=${q}`);
                const productos = await response.json();
                
                resDiv.innerHTML = productos.map(p => `
                    <div class="bg-white p-4 rounded-xl shadow border border-slate-100">
                        <img src="${p.imagen}" class="w-full h-40 object-contain mb-2">
                        <h3 class="font-bold text-slate-800">${p.producto}</h3>
                        <p class="text-blue-600 font-bold text-xl">${p.precioFinal}</p>
                        <p class="text-sm text-slate-500 mb-2">${p.tienda}</p>
                        <a href="${p.link}" target="_blank" class="block text-center bg-slate-100 py-2 rounded-lg hover:bg-slate-200">Ver producto</a>
                    </div>
                `).join('');
            } catch (error) {
                resDiv.innerHTML = '<p class="text-red-500">Error al buscar productos.</p>';
            }
        }
    </script>
</body>
</html>
