<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComprAhorro - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; min-height: 100vh; padding: 20px 0; }
        .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .btn-success { background-color: #28a745; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <img src="logo.png" alt="ComprAhorro" style="width: 80px; height: auto; margin-bottom: 10px;">
                        <h1 style="white-space: nowrap; font-size: 1.8rem; font-weight: bold; color: #1a1a1a; margin: 0;">ComprAhorro</h1>
                    </div>
                    <h2 class="text-center fw-bold mb-4">Crea tu cuenta ⚡</h2>
                    <form id="formRegistro">
                        <div class="mb-3">
                            <input id="nombre" type="text" class="form-control" placeholder="Nombre Completo" required>
                        </div>
                        <div class="mb-3">
                            <input id="email" type="email" class="form-control" placeholder="Correo electrónico" required>
                        </div>
                        <div class="mb-3">
                            <select id="localidad" class="form-select">
                                <option value="">Selecciona tu Localidad</option>
                                <option value="panama">Panamá</option>
                                <option value="otros">Otras Provincias</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <input id="password" type="password" class="form-control" placeholder="Contraseña segura" required>
                        </div>
                        <button id="btnRegistro" type="submit" class="btn btn-success w-100 shadow">Registrarme Gratis</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="login.html" class="text-muted small text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
                    </div>
                    <div class="text-center mt-2">
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:10000'
            : 'https://comprahorro-backend.onrender.com';

        document.getElementById('formRegistro').addEventListener('submit', async function(event) {
            event.preventDefault();
            const nombre   = document.getElementById('nombre').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const localidad = document.getElementById('localidad').value;
            const btn = document.getElementById('btnRegistro');
            btn.innerText = 'Procesando...';
            btn.disabled = true;
            try {
                const response = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, password, localidad })
                });
                const data = await response.json();
                if (response.ok) {
                    alert('¡Cuenta creada exitosamente! Ahora inicia sesión.');
                    window.location.href = 'login.html';
                } else {
                    alert('Error: ' + (data.message || 'No se pudo registrar'));
                }
            } catch (error) {
                alert('Sin conexión con el servidor. Verifica que el backend esté activo.');
            } finally {
                btn.innerText = 'Registrarme Gratis';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
