<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComprAhorro - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; min-height: 100vh; padding: 20px 0; }
        .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .btn-success { background-color: #28a745; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <img src="logo.svg" alt="ComprAhorro" style="width: 80px; height: auto; margin-bottom: 10px;">
                        <h1 style="white-space: nowrap; font-size: 1.8rem; font-weight: bold; color: #1a1a1a; margin: 0;">
                            ComprAhorro
                        </h1>
                    </div>

                    <h2 class="text-center fw-bold mb-4">Crea tu cuenta ⚡</h2>

                    <form>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Nombre Completo">
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Correo electrónico">
                        </div>
                        <div class="mb-3">
                            <select class="form-select text-muted">
                                <option selected>Selecciona tu Localidad</option>
                                <option value="panama">Panamá</option>
                                <option value="otros">Otras Provincias</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="Contraseña segura">
                        </div>
                        <div class="mb-4">
                            <input type="text" class="form-control" placeholder="Código de referido (Opcional)">
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 shadow">Registrarme Gratis</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="index.html" class="text-muted small text-decoration-none">← Volver al inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
