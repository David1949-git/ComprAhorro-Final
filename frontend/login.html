<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComprAhorro - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; min-height: 100vh; padding: 20px 0; }
        .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .btn-primary { background-color: #007bff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <img src="logo.png" alt="ComprAhorro" style="width: 80px; height: auto; margin-bottom: 10px;">
                        <h1 style="white-space: nowrap; font-size: 1.8rem; font-weight: bold; color: #1a1a1a; margin: 0;">ComprAhorro</h1>
                    </div>
                    <h2 class="text-center fw-bold mb-4">Bienvenido 👋</h2>
                    <form id="formLogin">
                        <div class="mb-3">
                            <input id="email" type="email" class="form-control" placeholder="Correo electrónico" required>
                        </div>
                        <div class="mb-4">
                            <input id="password" type="password" class="form-control" placeholder="Contraseña" required>
                        </div>
                        <button id="btnLogin" type="submit" class="btn btn-primary w-100 shadow">Entrar</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="registro.html" class="text-muted small text-decoration-none">¿No tienes cuenta? Regístrate gratis</a>
                    </div>
                    <div class="text-center mt-2">
                        <a href="index.html" class="text-muted small text-decoration-none">← Volver al inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:10000'
            : 'https://proyectocompras-hjwj.onrender.com';

        document.getElementById('formLogin').addEventListener('submit', async function(event) {
            event.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            btn.innerText = 'Verificando...';
            btn.disabled = true;
            try {
                const response = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok && data.status === 'success') {
                    localStorage.setItem('comprAhorro_user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Error: ' + (data.message || 'Credenciales incorrectas'));
                }
            } catch (error) {
                alert('Sin conexión con el servidor. Verifica que el backend esté activo.');
            } finally {
                btn.innerText = 'Entrar';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
