<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComprAhorro - Tu IA de Ahorro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4 font-sans">
    <div class="w-full max-w-lg bg-white rounded-[2.5rem] shadow-2xl p-10 text-center border border-gray-100">
        <div class="text-7xl mb-6">🐷</div>
        <h1 class="text-4xl font-black text-gray-900 tracking-tighter mb-2">ComprAhorro</h1>
        <p class="text-gray-500 mb-10 text-lg font-medium">¿Qué quieres comprar al mejor precio hoy?</p>

        <div class="relative group">
            <input type="text" id="ai-search" 
                placeholder="Ej: Carro de segunda barato o súper de la semana..." 
                class="w-full p-6 bg-gray-100 rounded-3xl border-2 border-transparent focus:border-black focus:bg-white transition-all outline-none text-lg shadow-inner">
            <button onclick="buscarConIA()" 
                class="absolute right-3 top-3 bottom-3 px-6 bg-black text-white rounded-2xl font-bold hover:scale-105 active:scale-95 transition-all">
                Buscar
            </button>
        </div>

        <p class="mt-8 text-xs text-gray-400 font-bold uppercase tracking-widest mb-4">Puedes buscar en:</p>
        <div class="flex justify-center gap-4 text-2xl opacity-50">
            <span title="Súper">🛒</span><span title="Farmacia">💊</span><span title="Autos">🚗</span>
            <span title="Hogar">🏠</span><span title="Tech">📱</span><span title="Herramientas">🛠️</span><span title="Comida">🍕</span>
        </div>
    </div>
    
    <p class="mt-10 text-[10px] uppercase tracking-widest text-gray-400 font-bold">Panamá • El Salvador • Conectividad Total</p>
    <script src="app.js"></script>
</body>
</html>
