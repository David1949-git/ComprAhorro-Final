<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComprAhorro - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; min-height: 100vh; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; }
        .btn-primary { background-color: #007bff; border: none; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <img src="logo.svg" alt="ComprAhorro" style="width: 80px; height: auto; margin-bottom: 10px;">
                        <h1 style="white-space: nowrap; font-size: 1.8rem; font-weight: bold; color: #1a1a1a; margin: 0;">
                            ComprAhorro
                        </h1>
                        <p class="text-muted small">Tu app para comprar con inteligencia</p>
                    </div>

                    <form>
                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" placeholder="nombre@ejemplo.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Entrar</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0">¿No tienes cuenta? <a href="registro.html" class="text-decoration-none fw-bold">Regístrate gratis</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
