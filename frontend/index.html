<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComprAhorro - Busca y Compara</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl p-8 text-center border border-gray-100">
        <div class="text-7xl mb-6">🐷</div>
        <h1 class="text-3xl font-black text-gray-900 tracking-tight">ComprAhorro</h1>
        <p class="text-gray-500 mt-2 mb-8 text-sm font-medium">Busca, compara y compra al mejor precio</p>

        <div class="space-y-3">
            <input type="text" id="nombre" placeholder="¿Cómo te llamas?" 
                class="w-full p-4 bg-gray-100 rounded-2xl border-none focus:ring-2 focus:ring-green-500 outline-none font-semibold text-gray-700">
            
            <input type="tel" id="whatsapp" placeholder="Tu WhatsApp (Ej: +507...)" 
                class="w-full p-4 bg-gray-100 rounded-2xl border-none focus:ring-2 focus:ring-green-500 outline-none font-semibold text-gray-700">
            
            <button onclick="iniciar()" 
                class="w-full py-4 bg-black text-white rounded-2xl font-bold text-lg hover:scale-[1.02] active:scale-95 transition-all shadow-lg mt-4">
                Empezar a Ahorrar
            </button>
        </div>

        <div class="flex justify-center gap-3 mt-10 text-xl opacity-40">
            <span>🛒</span><span>💊</span><span>🚗</span><span>🏠</span><span>📱</span><span>🛠️</span><span>🍕</span>
        </div>
    </div>
    <p class="mt-8 text-[10px] uppercase tracking-widest text-gray-400 font-bold">Panamá • El Salvador • Global</p>
    <script src="app.js"></script>
</body>
</html>
