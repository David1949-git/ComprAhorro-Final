<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComprAhorro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col items-center p-6 font-sans">
    <div class="mb-4">
        <img src="logo.png" alt="ComprAhorro" class="h-32 object-contain" onerror="this.style.display='none'">
    </div>
    <h1 class="text-4xl font-extrabold text-gray-900 mb-6">ComprAhorro</h1>
    <div class="w-full max-w-2xl flex bg-white shadow-lg rounded-full overflow-hidden mb-6 border border-gray-200">
        <input type="text" id="prodInput" placeholder="¿Qué quieres BUSCAR hoy?" class="flex-grow p-4 outline-none text-gray-700">
        <button id="btnBuscar" class="bg-black text-white font-bold px-8 py-4 hover:bg-gray-800 transition">BUSCAR</button>
    </div>
    <p class="text-center text-lg font-bold text-gray-800 max-w-lg mb-2">¡Nosotros buscamos, tú ahorras!</p>
    <ul class="text-center text-sm text-gray-600 max-w-lg mb-8 list-none">
        <li class="mb-1">✅ <span class="font-bold text-green-600">Compara</span> precios de varios comercios en tiempo real.</li>
        <li class="mb-1">✅ <span class="font-bold text-blue-600">Elige</span> con total calma y tranquilidad.</li>
        <li class="mb-1">✅ <span class="font-bold text-orange-500">Compra</span> directo sin intermediarios para tu máximo ahorro.</li>
    </ul>
    <div class="w-full max-w-2xl bg-white shadow-sm rounded-xl border border-gray-100 p-2">
        <div class="bg-gray-50 text-gray-500 text-xs font-bold text-center py-2 rounded mb-2">RESULTADOS DE BÚSQUEDA</div>
        <div id="lista-ahorros"></div>
    </div>
    <div class="w-full max-w-2xl text-center mt-4 mb-2">
        <a href="infocompras.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-white border border-gray-200 rounded-full shadow-sm hover:shadow-md hover:border-black transition text-sm font-semibold text-gray-700">
            🛒 Ir a InfoCompras — Mi lista del súper
        </a>
    </div>
    <script src="app.js"></script>
</body>
</html>
