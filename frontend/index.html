<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComprAhorro - Tu Central de Compras Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes rotate-icons {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .icon-ring {
            animation: rotate-icons 25s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans pb-20 text-slate-900">
    
    <div class="max-w-md mx-auto bg-white rounded-3xl p-6 shadow-xl mb-6 border-b-4 border-slate-900 text-center relative overflow-hidden">
        <div class="absolute inset-0 opacity-5 bg-[url('https://www.transparenttextures.com/patterns/absurdity.png')]"></div>
        <div class="relative z-10">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-1 font-bold">Inteligencia de Mercado - Panamá</p>
            <h1 class="text-4xl font-black italic text-slate-900 tracking-tighter">ComprAhorro</h1>
        </div>
    </div>

    <div class="max-w-md mx-auto bg-white rounded-3xl p-8 shadow-2xl text-center border border-gray-100 mb-8 relative">
        <div class="relative w-44 h-44 mx-auto mb-6 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border-2 border-dashed border-green-200 icon-ring">
                <span class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 text-2xl" title="Supermercado">🛒</span>
                <span class="absolute top-[15%] right-[10%] text-2xl" title="Farmacia">💊</span>
                <span class="absolute top-1/2 right-0 translate-x-1/2 -translate-y-1/2 text-2xl" title="Autos">🚗</span>
                <span class="absolute bottom-[15%] right-[10%] text-2xl" title="Ferretería">🔨</span>
                <span class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 text-2xl" title="Tecnología">💻</span>
                <span class="absolute bottom-[15%] left-[10%] text-2xl" title="Moda">👕</span>
                <span class="absolute top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 text-2xl" title="Hogar">🛋️</span>
            </div>
            <div class="relative w-24 h-24 bg-green-500 rounded-full flex items-center justify-center shadow-lg z-10 border-4 border-white">
                <span class="text-white text-5xl">🐷</span>
                <span class="absolute -top-2 -right-2 text-3xl">💰</span>
            </div>
        </div>
        
        <h2 class="text-xl font-black text-slate-900 mb-3 leading-tight uppercase">Busca, Compara y Compra</h2>
        <p class="text-sm text-slate-600 mb-6 font-medium">Del Súper al Auto, todo en un solo lugar y sin tener que visitar cada página.</p>
        
        <input type="text" id="busqueda" placeholder="¿Qué quieres ahorrar hoy?" 
               class="w-full p-4 rounded-xl border-2 border-slate-100 mb-5 outline-none focus:border-green-500 text-lg shadow-inner bg-slate-50 font-semibold">
        
        <button onclick="buscarAhora()" 
                class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition-all uppercase tracking-wider text-lg shadow-lg">
            Rastrear Mejores Precios
        </button>
        <p class="mt-4 text-[10px] text-green-700 font-bold uppercase tracking-tighter">⚡ Conectado al Mercado Panameño en Tiempo Real</p>
    </div>

    <div id="r" class="max-w-md mx-auto space-y-4 pb-20"></div>

    <script>
        function buscarAhora() {
            const query = document.getElementById('busqueda').value;
            const resDiv = document.getElementById('r');
            if(!query) return alert('Dime qué buscas, Capi.');

            resDiv.innerHTML = '<div class="text-center p-8 bg-white rounded-2xl shadow font-bold text-slate-700 italic">Investigando precios en todo Panamá...<br><span class="text-xs font-normal opacity-60">No necesitas buscar en otro lado, yo lo hago por ti.</span></div>';

            fetch('https://proyectocompras-hjwj.onrender.com/products/scrape?query=' + encodeURIComponent(query))
                .then(res => res.json())
                .then(data => {
                    resDiv.innerHTML = '';
                    if(!data || data.length === 0) {
                        resDiv.innerHTML = '<div class="text-center p-8 bg-white rounded-2xl shadow">No encontramos ofertas para "' + query + '" en este momento.</div>';
                        return;
                    }
                    data.forEach(item => {
                        resDiv.innerHTML += 
                            <a href="\" target="_blank" class="block bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden mb-4 hover:scale-[1.02] transition-all">
                                <div class="p-3 bg-slate-50 border-b border-gray-100 flex justify-between items-center">
                                   <span class="text-[10px] font-black text-blue-800 uppercase">\</span>
                                   <span class="text-[9px] bg-green-100 text-green-700 px-2 py-1 rounded-full font-bold">OFERTA ACTIVA</span>
                                </div>
                                <div class="p-4 flex items-center gap-4">
                                    <img src="\" class="w-20 h-20 object-contain" alt="Producto">
                                    <div class="flex-1">
                                        <h4 class="font-bold text-slate-800 text-sm leading-tight mb-1">\</h4>
                                        <p class="text-green-600 font-black text-xl">\</p>
                                        <p class="text-blue-600 text-[10px] font-bold mt-1">IR A LA TIENDA DIRECTO 🔗</p>
                                    </div>
                                </div>
                            </a>\;
                    });
                })
                .catch(err => {
                    resDiv.innerHTML = '<div class="text-center p-8 text-red-600">Error de conexión con el radar. Reintenta.</div>';
                });
        }
    </script>
</body>
</html>
