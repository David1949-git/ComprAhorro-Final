<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ComprAhorro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-registro { border-radius: 25px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; padding: 30px; margin: auto; }
        .btn-green { background-color: #28a745; color: white; border-radius: 50px; padding: 12px; font-weight: bold; width: 100%; border: none; transition: 0.3s; }
        .btn-green:hover { background-color: #218838; transform: translateY(-2px); }
        .form-control, .form-select { border-radius: 50px; padding: 12px 20px; border: 1px solid #ced4da; }
        .logo-img { max-width: 80px; margin-bottom: 15px; }
        .slogan-text { font-size: 0.9rem; color: #6c757d; margin-bottom: 25px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="card card-registro bg-white text-center">
            <img src="logo.png" alt="ComprAhorro" class="logo-img mx-auto">
            
            <h2 class="fw-bold mb-2">Crea tu cuenta ⚡</h2>
            <p class="slogan-text">ComprAhorro: Tu app gratuita para comprar con precisión e inteligencia, ahorrando en tiempos difíciles.</p>
            
            <form id="registerForm">
                <div class="mb-3 text-start">
                    <input type="text" id="nombre" class="form-control" placeholder="Nombre Completo" required>
                </div>

                <div class="mb-3 text-start">
                    <input type="email" id="email" class="form-control" placeholder="Correo electrónico" required>
                </div>

                <div class="mb-3 text-start">
                    <select id="localidad" class="form-select" required>
                        <option value="" disabled selected>Selecciona tu Localidad</option>
                        <option value="panama-centro">Panamá Centro</option>
                        <option value="san-miguelito">San Miguelito</option>
                        <option value="chorrera">La Chorrera</option>
                        <option value="otro">Otras Provincias</option>
                    </select>
                </div>

                <div class="mb-3 text-start">
                    <input type="password" id="password" class="form-control" placeholder="Contraseña segura" required>
                </div>

                <div class="mb-3 text-start">
                    <input type="text" id="referido" class="form-control" placeholder="Código de referido (Opcional)">
                </div>

                <button type="submit" class="btn btn-green mt-2 shadow">Registrarme Gratis</button>
                <div id="mensaje" class="mt-3 small"></div>
            </form>
            
            <div class="mt-4">
                <a href="index.html" class="text-decoration-none text-success">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const mensajeDiv = document.getElementById("mensaje");
        mensajeDiv.innerHTML = "<span class='text-muted'>Procesando tu ahorro...</span>";
        
        const userData = {
            nombre: document.getElementById('nombre').value,
            email: document.getElementById('email').value,
            localidad: document.getElementById('localidad').value,
            password: document.getElementById('password').value,
            referidoPor: document.getElementById('referido').value
        };

        try {
            const response = await fetch('http://localhost:3000/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                mensajeDiv.innerHTML = "<span class='text-success'>✅ ¡Bienvenido a ComprAhorro! Redirigiendo...</span>";
                // Redirección al Dashboard tras 2 segundos de éxito
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            } else {
                mensajeDiv.innerHTML = "<span class='text-danger'>❌ Hubo un problema. El correo podría estar ya registrado.</span>";
            }
        } catch (error) {
            console.error('Error en el registro:', error);
            mensajeDiv.innerHTML = "<span class='text-danger'>❌ Error de conexión. ¿Está el servidor encendido?</span>";
        }
    });
    </script>
</body>
</html>
